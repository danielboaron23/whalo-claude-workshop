<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>סיכום ניסוי תמחור · Whalo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap');
  :root{ --bg:#19135f; --bg2:#0e0a2c; --hair:rgba(255,255,255,.12); --text:#fff;
    --muted:rgba(255,255,255,.64); --faint:rgba(255,255,255,.42); --lime:#c6f24e; --blue:#6fbcfa; --azure:#1e9cf5;
    --ease:cubic-bezier(.32,.72,0,1); --font:'Heebo',sans-serif; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{ font-family:var(--font); color:var(--text); min-height:100vh; line-height:1.55; padding:clamp(20px,4vw,52px);
    background:radial-gradient(900px 600px at 85% -10%, rgba(30,156,245,.3), transparent 60%),
      radial-gradient(700px 500px at 0% 110%, rgba(198,242,78,.1), transparent 55%), linear-gradient(180deg,var(--bg),var(--bg2)); }
  .wrap{ max-width:880px; margin:0 auto; }
  .eyebrow{ display:inline-block; padding:6px 14px; border-radius:999px; font-size:11px; font-weight:700; letter-spacing:.18em;
    text-transform:uppercase; color:var(--lime); background:rgba(198,242,78,.1); border:1px solid rgba(198,242,78,.3); }
  h1{ font-size:clamp(26px,4vw,42px); font-weight:800; letter-spacing:-.02em; margin:14px 0 6px; }
  .sub{ color:var(--muted); font-size:15px; }
  .rec{ margin-top:18px; padding:18px 20px; border-radius:16px; background:linear-gradient(180deg,rgba(198,242,78,.14),rgba(198,242,78,.04));
    border:1px solid rgba(198,242,78,.4); }
  .rec h2{ font-size:18px; font-weight:800; margin-bottom:4px; } .rec p{ color:var(--muted); font-size:14.5px; } .rec b{ color:var(--lime); }
  .row{ display:flex; align-items:center; gap:12px; margin:26px 2px 14px; color:var(--faint); font-size:12px; letter-spacing:.12em; text-transform:uppercase; font-weight:700; } .row::after{ content:""; flex:1; height:1px; background:var(--hair); }
  table{ width:100%; border-collapse:collapse; border-radius:14px; overflow:hidden; background:rgba(255,255,255,.04); }
  th,td{ padding:13px 14px; text-align:right; font-size:14px; border-bottom:1px solid var(--hair); }
  th{ color:var(--faint); font-size:12px; font-weight:700; letter-spacing:.04em; }
  td .v{ font-weight:800; font-variant-numeric:tabular-nums; }
  tr.win{ background:rgba(198,242,78,.10); } tr.win td:first-child{ position:relative; }
  .badge{ font-size:11px; font-weight:800; color:#0b1b2b; background:var(--lime); padding:2px 8px; border-radius:999px; margin-inline-start:6px; }
  .bars{ margin-top:22px; display:grid; gap:12px; }
  .bar{ display:grid; grid-template-columns:90px 1fr 90px; align-items:center; gap:12px; }
  .bar .lab{ font-size:13px; color:var(--muted); } .bar .track{ height:26px; border-radius:8px; background:rgba(255,255,255,.07); overflow:hidden; }
  .bar .fill{ height:100%; border-radius:8px; background:linear-gradient(90deg,var(--azure),var(--lime)); transition:width .7s var(--ease); }
  .bar .amt{ font-weight:800; font-variant-numeric:tabular-nums; text-align:left; font-size:14px; }
  .bar.win .fill{ background:linear-gradient(90deg,var(--lime),#9be15d); }
  footer{ margin-top:24px; color:var(--faint); font-size:12px; text-align:center; line-height:1.7; } code{ background:rgba(255,255,255,.08); padding:2px 7px; border-radius:6px; font-size:12px; }
</style>
</head>
<body>
  <div class="wrap">
    <span class="eyebrow">Monetization · Whalo</span>
    <h1>סיכום ניסוי תמחור</h1>
    <p class="sub">Starter Pack · A/B/C על המחיר · 10,000 משתמשים לכל וריאנט.</p>

    <div class="rec" id="rec"></div>

    <div class="row">תוצאות לפי וריאנט</div>
    <table id="tbl"><thead><tr><th>וריאנט</th><th>מחיר</th><th>המרה</th><th>ARPU</th><th>הכנסה</th></tr></thead><tbody></tbody></table>

    <div class="row">הכנסה כוללת ($)</div>
    <div class="bars" id="bars"></div>

    <footer>מקור: <code>data/pricing-ab-results.csv</code> · Skill: <code>pricing-summary</code> · כל המדדים מחושבים מהמספרים הגולמיים. נתונים מדומים.</footer>
  </div>
<script>
  // raw rows from the CSV (embedded)
  const ROWS = [
    { v:"A", desc:"Control", price:4.99, users:10000, buyers:420, revenue:2095.80 },
    { v:"B", desc:"מחיר נמוך", price:2.99, users:10000, buyers:760, revenue:2272.40 },
    { v:"C", desc:"מחיר גבוה", price:7.99, users:10000, buyers:250, revenue:1997.50 },
  ];
  // compute metrics from raw numbers
  ROWS.forEach(r=>{ r.conv = r.buyers/r.users*100; r.arpu = r.revenue/r.users; });
  const winner = ROWS.reduce((a,b)=> b.revenue>a.revenue?b:a);
  const maxRev = Math.max(...ROWS.map(r=>r.revenue));

  // recommendation
  const second = [...ROWS].sort((a,b)=>b.revenue-a.revenue)[1];
  const lift = ((winner.revenue-ROWS.find(r=>r.v==='A').revenue)/ROWS.find(r=>r.v==='A').revenue*100);
  document.getElementById('rec').innerHTML =
    `<h2>🏆 הזוכה: וריאנט ${winner.v} — $${winner.price}</h2>
     <p>הכי הרבה הכנסה כוללת ($${winner.revenue.toLocaleString()}) <b>ו</b>שיעור ההמרה הגבוה ביותר (${winner.conv.toFixed(1)}%).
     מומלץ לשגר את המחיר <b>$${winner.price}</b> — צפי לעלייה של ~<b>${lift.toFixed(0)}%</b> בהכנסה מול ה-control.</p>`;

  const tb = document.querySelector('#tbl tbody');
  ROWS.forEach(r=>{
    const tr=document.createElement('tr'); if(r.v===winner.v) tr.className='win';
    tr.innerHTML=`<td><span class="v">${r.v}</span>${r.v===winner.v?'<span class="badge">זוכה</span>':''} <span style="color:var(--faint);font-size:12px">${r.desc}</span></td>
      <td class="v">$${r.price}</td><td><span class="v">${r.conv.toFixed(1)}%</span></td>
      <td class="v">$${r.arpu.toFixed(3)}</td><td class="v">$${r.revenue.toLocaleString()}</td>`;
    tb.appendChild(tr);
  });

  const bars=document.getElementById('bars');
  ROWS.forEach(r=>{
    const el=document.createElement('div'); el.className='bar'+(r.v===winner.v?' win':'');
    el.innerHTML=`<div class="lab">וריאנט ${r.v} · $${r.price}</div>
      <div class="track"><div class="fill" style="width:${r.revenue/maxRev*100}%"></div></div>
      <div class="amt">$${Math.round(r.revenue).toLocaleString()}</div>`;
    bars.appendChild(el);
  });
</script>
</body>
</html>
