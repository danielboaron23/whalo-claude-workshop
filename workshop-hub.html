<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Whalo · Claude Code — מרכז הסדנה</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap');
  :root{
    --bg:#19135f; --bg2:#0e0a2c; --panel:#160f50; --hair:rgba(255,255,255,.12); --text:#fff;
    --muted:rgba(255,255,255,.64); --faint:rgba(255,255,255,.42); --lime:#c6f24e; --blue:#6fbcfa; --azure:#1e9cf5;
    --ease:cubic-bezier(.32,.72,0,1); --font:'Heebo',sans-serif; --nav:300px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{ height:100%; }
  body{ font-family:var(--font); color:var(--text); overflow:hidden;
    background:linear-gradient(180deg,var(--bg),var(--bg2)); }

  /* ---------- sidebar ---------- */
  .sidebar{ position:fixed; top:0; right:0; width:var(--nav); height:100%; z-index:30; display:flex; flex-direction:column;
    background:linear-gradient(180deg, rgba(39,30,150,.6), rgba(14,10,44,.85)); backdrop-filter:blur(14px);
    border-inline-start:1px solid var(--hair); transform:translateX(100%); box-shadow:-30px 0 80px -40px rgba(0,0,0,.7); transition:transform .4s var(--ease); }
  .brand{ display:flex; align-items:center; gap:10px; padding:20px 22px 14px; font-weight:800; font-size:17px; letter-spacing:-.01em; }
  .brand b{ color:var(--lime); } .brand .p{ font-size:24px; }
  .nav{ flex:1; overflow-y:auto; padding:6px 12px 24px; }
  .nav::-webkit-scrollbar{ width:7px; } .nav::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.14); border-radius:9px; }
  .grp{ margin-top:16px; padding:0 10px; color:var(--faint); font-size:11px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; }
  .item{ display:flex; align-items:center; gap:11px; width:100%; text-align:right; cursor:pointer; border:none;
    font-family:var(--font); font-size:14.5px; font-weight:600; color:var(--text); background:none; border-radius:11px; padding:11px 12px; margin-top:4px; transition:.2s; }
  .item:hover{ background:rgba(255,255,255,.06); }
  .item.active{ background:linear-gradient(90deg, rgba(198,242,78,.16), rgba(198,242,78,.04)); color:var(--lime); box-shadow:inset 0 0 0 1px rgba(198,242,78,.3); }
  .item .ic{ font-size:18px; width:22px; text-align:center; flex-shrink:0; }
  .item .tag{ margin-inline-start:auto; font-size:10px; font-weight:800; color:var(--blue); background:rgba(30,156,245,.14); border:1px solid rgba(111,188,250,.3); padding:2px 8px; border-radius:999px; }
  .item.active .tag{ color:var(--lime); background:rgba(198,242,78,.12); border-color:rgba(198,242,78,.3); }
  .subs{ margin:2px 0 6px; padding-inline-start:33px; display:none; }
  .subs.open{ display:block; }
  .sub{ display:block; width:100%; text-align:right; cursor:pointer; border:none; background:none; font-family:var(--font);
    color:var(--muted); font-size:13px; padding:7px 10px; border-radius:9px; transition:.15s; }
  .sub:hover{ background:rgba(255,255,255,.05); color:var(--text); }
  .sub.active{ color:var(--lime); }
  .sub::before{ content:"› "; color:var(--faint); }

  /* ---------- main ---------- */
  .main{ margin-inline-end:0; height:100%; display:flex; flex-direction:column; }
  .topbar{ display:flex; align-items:center; gap:12px; padding:14px 24px; border-bottom:1px solid var(--hair);
    background:rgba(14,10,44,.4); backdrop-filter:blur(10px); }
  .burger{ display:inline-flex; align-items:center; justify-content:center; cursor:pointer; background:rgba(255,255,255,.08); border:1px solid var(--hair); color:var(--text); border-radius:10px; width:40px; height:40px; font-size:18px; transition:.2s; }
  .burger:hover{ background:rgba(198,242,78,.15); }
  .crumb{ font-weight:800; font-size:16px; } .crumb .role{ color:var(--faint); font-weight:600; font-size:13px; }
  .openbtn{ margin-inline-start:auto; text-decoration:none; font-size:13px; font-weight:700; color:var(--text);
    background:rgba(255,255,255,.07); border:1px solid var(--hair); border-radius:10px; padding:9px 14px; transition:.2s; }
  .openbtn:hover{ background:rgba(198,242,78,.15); }
  .stage{ flex:1; position:relative; overflow:hidden; }
  iframe{ width:100%; height:100%; border:none; display:block; background:#0e0a2c; }
  .doc{ position:absolute; inset:0; overflow-y:auto; padding:clamp(24px,4vw,56px); display:none; }
  .doc.show{ display:block; } iframe.show{ display:block; } iframe.hide{ display:none; }
  .doc-inner{ max-width:760px; margin:0 auto; line-height:1.7; color:var(--muted); }
  .doc-inner h1{ font-size:32px; color:var(--text); margin:.2em 0 .4em; letter-spacing:-.02em; }
  .doc-inner h2{ font-size:23px; color:var(--text); margin:1em 0 .4em; } .doc-inner h3{ font-size:18px; color:var(--lime); margin:1em 0 .3em; }
  .doc-inner p,.doc-inner li{ font-size:15.5px; } .doc-inner ul,.doc-inner ol{ padding-inline-start:24px; margin:.5em 0; }
  .doc-inner code{ background:rgba(255,255,255,.1); padding:2px 7px; border-radius:6px; font-size:13px; color:var(--lime); }
  .doc-inner pre{ background:rgba(0,0,0,.35); border:1px solid var(--hair); border-radius:12px; padding:16px; overflow:auto; }
  .doc-inner pre code{ background:none; color:#dfe8ff; }
  .doc-inner blockquote{ border-inline-start:3px solid var(--lime); padding-inline-start:14px; color:var(--faint); margin:.6em 0; }
  .doc-inner table{ width:100%; border-collapse:collapse; margin:.6em 0; } .doc-inner th,.doc-inner td{ border:1px solid var(--hair); padding:8px 11px; text-align:right; font-size:14px; }
  .doc-inner a{ color:var(--blue); } .doc-inner strong{ color:var(--text); }
  .loading,.err{ position:absolute; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column; gap:12px; color:var(--faint); text-align:center; padding:30px; }
  .loading.show,.err.show{ display:flex; }
  .err a{ color:var(--lime); }

  /* ---------- home ---------- */
  .home{ position:absolute; inset:0; overflow-y:auto; padding:clamp(28px,5vw,64px); display:none; }
  .home.show{ display:block; }
  .home-in{ max-width:1000px; margin:0 auto; }
  .eyebrow{ display:inline-block; padding:6px 14px; border-radius:999px; font-size:11px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:var(--lime); background:rgba(198,242,78,.1); border:1px solid rgba(198,242,78,.3); }
  .home h1{ font-size:clamp(30px,5vw,52px); font-weight:800; letter-spacing:-.03em; margin:14px 0 10px; }
  .home h1 .accent{ background:linear-gradient(105deg,var(--lime),var(--blue)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .home .lead{ color:var(--muted); font-size:17px; max-width:60ch; }
  .qrow{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:24px; }
  .grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:13px; margin-top:14px; }
  @media (max-width:820px){ .grid{ grid-template-columns:1fr 1fr; } .qrow{ grid-template-columns:1fr; } }
  . tile,.qtile,.pcard{ }
  .qtile,.pcard{ position:relative; text-align:right; cursor:pointer; border:none; font-family:var(--font); color:inherit;
    border-radius:18px; padding:22px; background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));
    box-shadow:0 26px 64px -46px rgba(0,0,0,.7), inset 0 1px 1px rgba(255,255,255,.1); border:1px solid var(--hair); transition:transform .4s var(--ease), border-color .3s; }
  .qtile:hover,.pcard:hover{ transform:translateY(-3px); border-color:rgba(198,242,78,.4); }
  .qtile .ic{ font-size:28px; } .qtile h3{ font-size:20px; font-weight:800; margin:8px 0 4px; } .qtile p{ color:var(--muted); font-size:13.5px; }
  .pcard .tag{ font-size:11px; font-weight:800; color:var(--blue); background:rgba(30,156,245,.14); border:1px solid rgba(111,188,250,.35); padding:3px 10px; border-radius:999px; }
  .pcard h4{ font-size:17px; font-weight:800; margin:10px 0 3px; } .pcard p{ color:var(--muted); font-size:13px; }
  .row-h{ display:flex; align-items:center; gap:12px; margin:30px 2px 6px; color:var(--faint); font-size:12px; letter-spacing:.12em; text-transform:uppercase; font-weight:700; } .row-h::after{ content:""; flex:1; height:1px; background:var(--hair); }

  .scrim{ position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:25; display:none; }
  /* sidebar is hidden by default at all widths — opens only on ☰ click */
  body.navopen .sidebar{ transform:translateX(0); }
  body.navopen .scrim{ display:block; }
</style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="brand"><span class="p">🐧</span> Whalo · <b>Claude Code</b></div>
    <nav class="nav" id="navEl"></nav>
  </aside>
  <div class="scrim" id="scrim"></div>

  <div class="main">
    <div class="topbar">
      <button class="burger" id="burger" aria-label="תפריט">☰</button>
      <div class="crumb" id="crumb">בית</div>
      <a class="openbtn" id="openbtn" href="#" target="_blank" rel="noopener">↗ פתח בטאב חדש</a>
    </div>
    <div class="stage">
      <!-- HOME -->
      <div class="home show" id="home"><div class="home-in">
        <span class="eyebrow">Whalo · Claude Code Workshop</span>
        <h1>מרכז <span class="accent">הסדנה</span></h1>
        <p class="lead">כל מה שצריך במקום אחד: המצגת, ההכנה, ו-6 פרויקטים לדוגמה — לכל תפקיד כלי שלם
          עם Skill, אפליקציה רצה, דאטה ומדריך. נווטו מהסרגל מימין, או בחרו מכאן.</p>
        <div class="qrow" id="qrow"></div>
        <div class="row-h">פרויקטים — לפי תפקיד</div>
        <div class="grid" id="pgrid"></div>
      </div></div>
      <!-- IFRAME -->
      <iframe id="frame" class="hide" title="תצוגה"></iframe>
      <!-- DOC (rendered markdown) -->
      <div class="doc" id="doc"><div class="doc-inner" id="docInner"></div></div>
      <div class="loading" id="loading">טוען…</div>
      <div class="err" id="err"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
  /* ============================================================================
     NAV CONFIG — single source of truth. להוסיף Skill/דוגמה? הוסיפו פריט ל-views.
     ========================================================================== */
  const NAV = [
    { group:'כללי', items:[
      { id:'home',  label:'בית',        ic:'🏠', home:true },
      { id:'deck',  label:'המצגת',      ic:'🎤', deck:'whalo-workshop.html', views:[
          {label:'👋 נעים להכיר (וידאו)', slide:0},
          {label:'מהפתיחה', slide:1},
          {label:'עליי', slide:2},
          {label:'דרכים לעבוד · Chat/Cowork/Code', slide:3},
          {label:'Cowork מול Code · מבט מקרוב', slide:7},
          {label:'הרחבה · Skills/Connectors/Plugins', slide:11},
          {label:'⚡ פרק Skills', slide:12},
          {label:'12 Skills לפרויקטים', slide:30},
          {label:'בונים — תרגול', slide:33},
          {label:'🗂️ הפרויקטים שבנינו', slide:35},
          {label:'📚 חומרי עזר', slide:36} ] },
      { id:'setup', label:'דף הכנה',    ic:'✅', url:'whalo-setup.html' },
    ]},
    { group:'פרויקטים', items:[
      { id:'hr',  label:'מסנן קו״ח', tag:'HR', ic:'📄', desc:'דירוג מועמדים + העלאת CV + Notion',
        base:'projects/hr-resume-screener', views:[
          {label:'אפליקציה', file:'app/index.html'},
          {label:'🎬 מאחורי הקלעים', file:'BEHIND.md'},
          {label:'▶️ הרצה חיה (demo)', file:'demo/RUN.md'},
          {label:'⚡ ה-Skill', file:'.claude/skills/resume-screener/SKILL.md'},
          {label:'מדריך (Lab)', file:'STEPS.md'},
          {label:'מטרה', file:'GOAL.md'} ] },
      { id:'mkt', label:'קופי לחנות', tag:'Marketing', ic:'✍️', desc:'וריאציות קופי ל-A/B',
        base:'projects/marketing-aso-copy', views:[
          {label:'אפליקציה', file:'app/index.html'}, {label:'מדריך (Lab)', file:'STEPS.md'}, {label:'מטרה', file:'GOAL.md'} ] },
      { id:'prd', label:'בריף בוקר', tag:'Product', ic:'☕', desc:'דיג׳סט מ-Slack + Notion',
        base:'projects/product-daily-brief', views:[
          {label:'אפליקציה', file:'app/index.html'}, {label:'מדריך (Lab)', file:'STEPS.md'}, {label:'מטרה', file:'GOAL.md'} ] },
      { id:'fin', label:'סורק רגולציה', tag:'Finance', ic:'⚖️', desc:'דוח פערי תאימות',
        base:'projects/finance-regulation-scanner', views:[
          {label:'אפליקציה', file:'app/index.html'}, {label:'מדריך (Lab)', file:'STEPS.md'}, {label:'מטרה', file:'GOAL.md'} ] },
      { id:'mon', label:'ניסוי תמחור', tag:'Monetization', ic:'📊', desc:'דשבורד A/B + המלצה',
        base:'projects/monetization-pricing-summary', views:[
          {label:'אפליקציה', file:'app/index.html'}, {label:'מדריך (Lab)', file:'STEPS.md'}, {label:'מטרה', file:'GOAL.md'} ] },
      { id:'art', label:'מארגן נכסים', tag:'Art', ic:'🎨', desc:'קטלוג + בריף ויזואלי',
        base:'projects/art-asset-brief', views:[
          {label:'אפליקציה', file:'app/index.html'}, {label:'מדריך (Lab)', file:'STEPS.md'}, {label:'מטרה', file:'GOAL.md'} ] },
    ]},
  ];

  const flat = {};   // id -> item
  NAV.forEach(g => g.items.forEach(it => flat[it.id] = it));
  const urlOf = (it, vi=0) => it.home ? null
    : it.deck ? (it.deck + '?s=' + ((it.views[vi] && it.views[vi].slide) || 0))
    : (it.url ? it.url : (it.base + '/' + it.views[vi].file));

  const navEl=document.getElementById('navEl'), frame=document.getElementById('frame'),
        home=document.getElementById('home'), doc=document.getElementById('doc'), docInner=document.getElementById('docInner'),
        loading=document.getElementById('loading'), err=document.getElementById('err'),
        crumb=document.getElementById('crumb'), openbtn=document.getElementById('openbtn');

  /* ---- build sidebar ---- */
  NAV.forEach(g=>{
    const h=document.createElement('div'); h.className='grp'; h.textContent=g.group; navEl.appendChild(h);
    g.items.forEach(it=>{
      const b=document.createElement('button'); b.className='item'; b.dataset.id=it.id;
      b.innerHTML=`<span class="ic">${it.ic}</span><span>${it.label}</span>${it.tag?`<span class="tag">${it.tag}</span>`:''}`;
      b.onclick=()=>{ if(it.views&&it.views.length>1){ toggleSubs(it.id); } go(it.id,0); };
      navEl.appendChild(b);
      if(it.views && it.views.length){
        const s=document.createElement('div'); s.className='subs'; s.dataset.subs=it.id;
        it.views.forEach((v,vi)=>{ const sb=document.createElement('button'); sb.className='sub'; sb.dataset.id=it.id; sb.dataset.vi=vi;
          sb.textContent=v.label; sb.onclick=(e)=>{ e.stopPropagation(); go(it.id,vi); }; s.appendChild(sb); });
        navEl.appendChild(s);
      }
    });
  });
  function toggleSubs(id){ document.querySelectorAll('.subs').forEach(s=>{ if(s.dataset.subs===id) s.classList.toggle('open'); }); }
  function openSubs(id){ document.querySelectorAll('.subs').forEach(s=> s.classList.toggle('open', s.dataset.subs===id)); }

  /* ---- home cards ---- */
  const qrow=document.getElementById('qrow');
  [['deck','🎤','המצגת','17 שקופיות עם Pingo המונפש'],['setup','✅','דף ההכנה','צ׳ק-ליסט לפני הסדנה']].forEach(([id,ic,t,p])=>{
    const b=document.createElement('button'); b.className='qtile'; b.innerHTML=`<div class="ic">${ic}</div><h3>${t}</h3><p>${p}</p>`;
    b.onclick=()=>go(id,0); qrow.appendChild(b);
  });
  const pgrid=document.getElementById('pgrid');
  NAV[1].items.forEach(it=>{ const b=document.createElement('button'); b.className='pcard';
    b.innerHTML=`<span class="tag">${it.tag}</span><h4>${it.label}</h4><p>${it.desc}</p>`;
    b.onclick=()=>{ openSubs(it.id); go(it.id,0); }; pgrid.appendChild(b); });

  /* ---- router ---- */
  function setActive(id,vi){
    document.querySelectorAll('.item').forEach(b=>b.classList.toggle('active', b.dataset.id===id));
    document.querySelectorAll('.sub').forEach(b=>b.classList.toggle('active', b.dataset.id===id && +b.dataset.vi===vi));
  }
  function showOnly(which){ home.classList.toggle('show',which==='home'); frame.className=which==='frame'?'show':'hide';
    doc.classList.toggle('show',which==='doc'); }

  async function go(id, vi=0){
    const it=flat[id]; if(!it) return;
    setActive(id,vi); document.body.classList.remove('navopen');
    location.hash = id + (vi?(':'+vi):'');
    if(it.home){ crumb.textContent='בית'; openbtn.style.visibility='hidden'; showOnly('home'); return; }
    openbtn.style.visibility='visible';
    const view = it.views ? it.views[vi] : null;
    crumb.innerHTML = (it.tag?`<span class="role">${it.tag} · </span>`:'') + it.label + (view?` — ${view.label}`:'');
    const url = urlOf(it,vi); openbtn.href=url;
    err.classList.remove('show');
    if(url.endsWith('.md')){
      showOnly('doc'); docInner.innerHTML=''; loading.classList.add('show');
      try{ const r=await fetch(url); if(!r.ok) throw 0; const md=await r.text();
        docInner.innerHTML = window.marked ? marked.parse(md) : ('<pre>'+md.replace(/</g,'&lt;')+'</pre>');
      }catch(e){ showErr(url); }
      loading.classList.remove('show');
    } else {
      showOnly('frame');
      if(it.deck && frame.dataset.deck==='1' && frame.contentWindow){
        // deck already loaded — jump to the chapter without reloading (keeps Pingo/3D alive)
        frame.contentWindow.postMessage({gotoSlide:(it.views[vi]&&it.views[vi].slide)||0},'*');
      } else {
        loading.classList.add('show');
        frame.onload=()=>{ loading.classList.remove('show'); frame.dataset.deck = it.deck?'1':''; };
        frame.src=url;
      }
    }
  }
  function showErr(url){ showOnly('doc'); docInner.innerHTML=''; err.classList.add('show');
    err.innerHTML=`לא ניתן להציג כאן (כנראה נפתח כקובץ מקומי).<br><a href="${url}" target="_blank">פתח את הקובץ בטאב חדש ↗</a><br><span style="font-size:12px">טיפ: הריצו דרך שרת/לינק ציבורי כדי לראות הכל מובנה.</span>`; }

  document.getElementById('burger').onclick=()=>document.body.classList.toggle('navopen');
  document.getElementById('scrim').onclick=()=>document.body.classList.remove('navopen');

  /* ---- initial route from hash ---- */
  (function init(){
    const h=(location.hash||'').replace('#',''); const [id,vi]=h.split(':');
    if(id && flat[id]){ if(flat[id].views) openSubs(id); go(id, +vi||0); }
    else go('home',0);
  })();
  addEventListener('hashchange',()=>{ const [id,vi]=(location.hash.replace('#','')).split(':'); if(id&&flat[id]&&!document.querySelector('.item.active[data-id="'+id+'"]')) go(id,+vi||0); });
  </script>
</body>
</html>
